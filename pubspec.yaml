name: client_information
description: This is a plugin that let you get the basic information from your
  application's client. It's easy to use and support different
  platforms(Android, iOS and Web).
version: 2.0.0-nullsafety.1
homepage: https://github.com/Kent1011/client_information

environment:
  sdk: '>=2.12.0-0 <3.0.0'
  flutter: '>=1.20.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^0.13.0
  uuid: ^3.0.0-nullsafety.0

dev_dependencies:
  flutter_test:
    sdk: flutter

dependency_overrides:
  path: ^1.8.0
  http_parser: ^4.0.0
  meta: ^1.3.0
  typed_data: ^1.3.0
  string_scanner: ^1.1.0
  source_span: ^1.8.0
  charcode: ^1.2.0
  collection: ^1.15.0
  term_glyph: ^1.2.0

flutter:
  plugin:
    platforms:
      android:
        package: kent.chien.client_information
        pluginClass: ClientInformationPlugin
      ios:
        pluginClass: ClientInformationPlugin
      web:
        pluginClass: ClientInformationWeb
        fileName: client_information_web.dart
